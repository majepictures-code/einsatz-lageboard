<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#b91c1c">
  <meta name="description" content="Lokales, offlinefähiges Einsatz-Lageboard für Feuerwehr-Führungskräfte.">
  <title>Einsatz-Lageboard</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Feuerwehr · lokal auf diesem Gerät</p>
      <h1>Einsatz-Lageboard</h1>
    </div>
    <div class="connection" id="connection" aria-live="polite">Online</div>
  </header>

  <main>
    <section class="card incident-card" aria-labelledby="incident-heading">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Einsatz</p>
          <h2 id="incident-heading">Grunddaten</h2>
        </div>
        <div class="clock" id="clock">--:--:--</div>
      </div>

      <div class="form-grid">
        <label>
          Einsatznummer
          <input id="incident-number" type="text" autocomplete="off" placeholder="z. B. 2026-0142">
        </label>
        <label>
          Stichwort
          <input id="incident-keyword" type="text" autocomplete="off" placeholder="z. B. B3Y">
        </label>
        <label class="wide">
          Einsatzort
          <input id="incident-location" type="text" autocomplete="off" placeholder="Straße oder Abschnitt">
        </label>
      </div>

      <div class="incident-actions">
        <button class="button primary" id="start-incident" type="button">Einsatz starten</button>
        <p id="incident-runtime" class="runtime">Noch nicht gestartet</p>
      </div>
    </section>

    <section class="stats" aria-label="Übersicht">
      <article><strong id="team-count">0</strong><span>Trupps</span></article>
      <article><strong id="active-count">0</strong><span>im Einsatz</span></article>
      <article><strong id="pa-count">0</strong><span>unter PA</span></article>
    </section>

    <section class="card" aria-labelledby="teams-heading">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Kräfte</p>
          <h2 id="teams-heading">Trupps und Aufträge</h2>
        </div>
      </div>

      <form id="team-form" class="team-form">
        <label>
          Trupp
          <input name="name" required autocomplete="off" placeholder="Angriffstrupp HLF 1">
        </label>
        <label>
          Auftrag
          <input name="task" required autocomplete="off" placeholder="Menschenrettung 1. OG">
        </label>
        <button class="button primary" type="submit">Trupp hinzufügen</button>
      </form>

      <div id="team-list" class="team-list" aria-live="polite"></div>
      <p id="team-empty" class="empty-state">Noch keine Trupps angelegt.</p>
    </section>

    <section class="card" aria-labelledby="log-heading">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Dokumentation</p>
          <h2 id="log-heading">Einsatzchronik</h2>
        </div>
      </div>

      <form id="log-form" class="log-form">
        <input name="message" required autocomplete="off" aria-label="Neue Meldung" placeholder="Rückmeldung oder Ereignis eintragen">
        <button class="button secondary" type="submit">Eintragen</button>
      </form>
      <ol id="log-list" class="log-list"></ol>
      <p id="log-empty" class="empty-state">Die Chronik wird automatisch mitgeführt.</p>
    </section>
  </main>

  <footer class="app-footer">
    <button class="button secondary" id="export-data" type="button">Einsatz exportieren</button>
    <button class="button danger" id="reset-data" type="button">Neuen Einsatz anlegen</button>
  </footer>

  <noscript>Für das Einsatz-Lageboard muss JavaScript aktiviert sein.</noscript>
  <script src="./app.js" defer></script>
</body>
</html>
